name: Build cc-connect (fork)                                                                                                          
                                                            
on:
    push:
      branches: ['**']                                                                                                                   
    workflow_dispatch:
                                                                                                                                         
  jobs:                                                     
    build-darwin-arm64:
      runs-on: macos-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5                                                                                                      
          with:
            go-version: '1.25'                                                                                                           
        - name: Build                                       
          run: |
            go build -o cc-connect ./cmd/cc-connect
            ls -lh cc-connect                                                                                                            
        - uses: actions/upload-artifact@v4
          with:                                                                                                                          
            name: cc-connect-darwin-arm64                   
            path: cc-connect                                                                                                             
            retention-days: 30
